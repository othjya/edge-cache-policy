name: Validate rules

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate rule syntax
        shell: bash
        run: |
          set -euo pipefail
          allowed='^(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD|PROCESS-NAME|IP-CIDR|IP-CIDR6),'
          while IFS= read -r line; do
            line="${line%$'\r'}"
            [[ -z "$line" || "$line" =~ ^# ]] && continue
            if ! [[ "$line" =~ $allowed ]]; then
              echo "Invalid rule: $line"
              exit 1
            fi
          done < rules/assets.list
